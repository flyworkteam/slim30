name: slim30
description: "Slim30 Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.1
  google_fonts: ^6.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  iconsax_flutter: ^1.0.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.2
  flutter_slidable: ^3.1.1
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/antrenman/
    - assets/images/woman/
    - assets/images/man/
    - assets/images/icons/
    - assets/images/icons/homePage/
    - assets/images/icons/profilePage/
    - assets/images/icons/share_icon/
    - assets/images/icons/notification_icon/
    - assets/images/icons/progress_icon/
